<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lane Runner — Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05070f;
            color: #e9f0ff;
            font-family: 'Bahnschrift', 'Segoe UI', sans-serif;
            text-align: center;
        }
        .card { padding: 32px; }
        h1 {
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 1.4rem;
            color: #3bffb3;
        }
        p { color: rgba(220, 230, 255, 0.7); }
        button {
            margin-top: 16px;
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(120deg, #39f9c0, #25a6ff);
            color: #05070f;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Offline</h1>
        <p>Lane Runner braucht eine Internetverbindung.<br>Prüfe dein Netz und versuch es nochmal.</p>
        <button onclick="location.reload()">Neu laden</button>
    </div>
</body>
</html>
